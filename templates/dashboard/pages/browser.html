{% extends "dashboard/components/base.html" %}
{% set active_page = "browser" %}
{% block title %}Browser - Stremio HTTP Proxy{% endblock %}
{% block page_title %}Browser Media{% endblock %}

{% block content %}
<div class="rounded-xl border bg-white shadow-sm">
  <div class="border-b px-5 py-4">
    <h2 class="text-lg font-semibold text-gray-900">Cerca media</h2>
  </div>
  <div class="p-5 space-y-4">
    <div class="flex flex-wrap items-end gap-3">
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Tipo</label>
        <select id="search-type" class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none">
          <option value="movie">Film</option>
          <option value="series">Serie TV</option>
        </select>
      </div>
      <div class="flex-1 min-w-[200px]">
        <label class="block text-xs font-medium text-gray-500 mb-1">Nome o IMDB ID</label>
        <input type="text" id="search-query" placeholder="es. The Matrix o tt0133093" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none">
      </div>
      <button id="search-btn" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">Cerca</button>
    </div>

    <div id="search-results" class="hidden">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-4" id="results-grid"></div>
      <div id="load-more-container" class="hidden mt-4 text-center">
        <button id="load-more-btn" class="rounded-lg border border-indigo-300 px-5 py-2 text-sm font-medium text-indigo-700 hover:bg-indigo-50">Carica altri risultati</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const searchType = document.getElementById('search-type');
const searchQuery = document.getElementById('search-query');
const searchBtn = document.getElementById('search-btn');
const searchResults = document.getElementById('search-results');
const resultsGrid = document.getElementById('results-grid');
const loadMoreContainer = document.getElementById('load-more-container');
const loadMoreBtn = document.getElementById('load-more-btn');

let currentPage = 1;
let totalPages = 1;
let lastQuery = '';
let lastSearchType = 'movie';

async function goToDetail(imdbId, type) {
  window.location.href = '/dashboard/browser/' + type + '/' + imdbId;
}

async function fetchAndRenderResults(query, type, page, append) {
  const resp = await fetch('/api/browser/search?q=' + encodeURIComponent(query) + '&type=' + type + '&page=' + page);
  const data = await resp.json();

  if (!append) {
    resultsGrid.innerHTML = '';
  }

  totalPages = data.total_pages;
  currentPage = data.page;

  for (const r of data.results) {
    const div = document.createElement('div');
    div.className = 'rounded-lg border bg-white p-3 cursor-pointer hover:shadow-md transition-shadow';
    div.innerHTML = `
      <img class="w-full h-40 object-cover rounded bg-gray-100" src="${r.poster || ''}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22185%22 height=%22278%22><rect fill=%22%23e5e7eb%22 width=%22185%22 height=%22278%22/></svg>'">
      <p class="mt-2 text-sm font-medium text-gray-900">${r.title}</p>
      <p class="text-xs text-gray-500">${r.year || ''}</p>
    `;
    div.onclick = async () => {
      const resolveResp = await fetch('/api/browser/resolve?tmdb_id=' + r.tmdb_id + '&type=' + type);
      const resolveData = await resolveResp.json();
      if (resolveData.imdb_id) {
        await goToDetail(resolveData.imdb_id, type);
      } else {
        alert('IMDB ID non trovato per questo titolo');
      }
    };
    resultsGrid.appendChild(div);
  }

  if (currentPage < totalPages) {
    loadMoreContainer.classList.remove('hidden');
  } else {
    loadMoreContainer.classList.add('hidden');
  }
}

async function doSearch() {
  const q = searchQuery.value.trim();
  const type = searchType.value;
  if (!q) return;

  if (q.startsWith('tt')) {
    await goToDetail(q, type);
    return;
  }

  lastQuery = q;
  lastSearchType = type;
  currentPage = 1;
  searchResults.classList.remove('hidden');

  await fetchAndRenderResults(q, type, 1, false);
}

loadMoreBtn.addEventListener('click', async () => {
  currentPage++;
  await fetchAndRenderResults(lastQuery, lastSearchType, currentPage, true);
});

searchBtn.addEventListener('click', doSearch);
searchQuery.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
{% endblock %}
