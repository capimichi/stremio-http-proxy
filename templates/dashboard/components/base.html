<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Stremio HTTP Proxy{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      width: 100%;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
      color: #d1d5db;
      text-decoration: none;
    }
    .sidebar-link:hover { background: #374151; color: #fff; }
    .sidebar-link.active { background: #374151; color: #fff; }
    .sidebar-link svg { display: block; flex-shrink: 0; }
  </style>
</head>
<body class="bg-gray-100 antialiased">
  <div class="flex h-screen overflow-hidden">
    {% include "dashboard/components/sidebar.html" %}
    <div class="flex flex-1 flex-col overflow-hidden">
      {% include "dashboard/components/header.html" %}
      <main class="flex-1 overflow-y-auto p-6">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
