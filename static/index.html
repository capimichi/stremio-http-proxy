<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stremio HTTP Proxy</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="layout">
    <section class="hero panel">
      <div>
        <p class="eyebrow">Dashboard</p>
        <h1>Stremio HTTP Proxy</h1>
        <p class="subtitle">Manifest e stato della cache con focus sui download in corso.</p>
      </div>
      <a id="manifest-url" class="manifest-link" href="#">Caricamento manifest...</a>
    </section>

    <section class="summary-grid" id="summary-cards">
      <article class="summary-card accent-blue">
        <span class="summary-label">Entry totali</span>
        <strong id="summary-total-items">-</strong>
      </article>
      <article class="summary-card accent-green">
        <span class="summary-label">Download attivi</span>
        <strong id="summary-active-downloads">-</strong>
      </article>
      <article class="summary-card accent-violet">
        <span class="summary-label">Cache occupata</span>
        <strong id="summary-cache-size">-</strong>
      </article>
      <article class="summary-card accent-amber">
        <span class="summary-label">Stati</span>
        <strong id="summary-status-counts">-</strong>
      </article>
    </section>

    <section class="panel">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Download</p>
          <h2>Situazione corrente</h2>
        </div>
        <div class="pagination">
          <button id="prev-page" type="button">Precedente</button>
          <span id="page-info">Pagina 1</span>
          <button id="next-page" type="button">Successiva</button>
        </div>
      </div>

      <div id="downloads" class="downloads">
        <p class="empty">Caricamento...</p>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
